<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiberNest – Storefront</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:["'Playfair Display'","serif"],sans:["'DM Sans'","sans-serif"]},colors:{sage:{DEFAULT:"#7a8c6e",dark:"#5a6b50",light:"#c5d0bc"},cream:"#f8f5f0",tan:"#e8dfd0"}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../api.js"></script>
  <style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  body {
    animation: fadeIn 0.10s ease forwards;
  }
</style>

<script>
  document.addEventListener("click", function(e) {
    const link = e.target.closest("a[href]");
    if (!link) return;
    const href = link.getAttribute("href");
    if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto")) return;
    e.preventDefault();
    document.body.style.transition = "opacity 0.3s ease";
    document.body.style.opacity = "0";
    setTimeout(() => { window.location.href = href; }, 300);
  });
</script>
</head>
<body class="bg-cream font-sans min-h-screen flex flex-col">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const MOCK = {
  banner: { title:"Summer Gardening Sale", subtitle:"Up to 30% off on all coco peat and grow bags this season.", cta:"Shop Now", bg:"from-sage to-sage-dark" },
  new: [
    { id:11, name:"Coir Hanging Basket Liner", price:220, category:"Home", badge:"New", emoji:"🧺" },
    { id:12, name:"Erosion Control Blanket 2m", price:1200, category:"Construction", badge:"New", emoji:"🏗️" },
    { id:13, name:"Coco Peat Disc Set (12pcs)", price:195, category:"Gardening", badge:"New", emoji:"🌱" },
  ],
  trending: [
    { id:21, name:"Premium Coco Peat Block 5kg", price:350, category:"Gardening", badge:"Trending", emoji:"🧱" },
    { id:22, name:"Geotextile Coir Mat 1m×2m", price:980, category:"Construction", badge:"Trending", emoji:"🌾" },
    { id:23, name:"Natural Fiber Doormat 40×60cm", price:495, category:"Home", badge:"Trending", emoji:"🏠" },
    { id:24, name:"Coir Rope 50m Roll", price:380, category:"Industrial", badge:"Trending", emoji:"🪢" },
  ],
  bestseller: [
    { id:31, name:"Coco Peat Grow Bag Set 5pcs", price:399, category:"Gardening", badge:"Best Seller", emoji:"🌿" },
    { id:32, name:"Bulk Coir Fiber 10kg", price:750, category:"Industrial", badge:"Best Seller", emoji:"📦" },
    { id:33, name:"Seedling Coir Tray 50-cells", price:280, category:"Gardening", badge:"Best Seller", emoji:"🌱" },
    { id:34, name:"Coir Log 3m Erosion Control", price:1450, category:"Construction", badge:"Best Seller", emoji:"🪵" },
  ],
};

const BADGE_COLOR = { "New":"bg-blue-500", "Trending":"bg-amber-500", "Best Seller":"bg-sage" };

function Navbar() {
  const [cartCount, setCartCount] = useState(Api.cart.count());
  const [search, setSearch] = useState("");
  const user = Api.getUser();

  const handleSearch = (e) => {
    if (e.key === "Enter" && search.trim()) {
      window.location.href = `products.html?search=${encodeURIComponent(search.trim())}`;
    }
  };

  return (
    <nav className="bg-white border-b border-stone-200 sticky top-0 z-50 h-16 flex items-center">
      <div className="max-w-6xl mx-auto px-6 w-full flex items-center gap-6">
        <a href="index.html" className="flex items-center gap-2.5 flex-shrink-0">
          <img src="../assets/img/logo.png" alt="FiberNest" className="h-10 w-auto" />
          <div>
            <span className="font-display font-bold text-gray-900 text-lg leading-none">FiberNest</span>
          </div>
        </a>

        {/* Nav links */}
        <div className="hidden md:flex items-center gap-1 pl-6">
          {[["Home","index.html"],["Shop","products.html"],["Storefront","storefront.html"]].map(([label, href]) => {
            const isActive = window.location.href.includes(href);
            return (
              <a key={href} href={href}
                className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${isActive ? "text-gray-900 bg-stone-100" : "text-gray-500 hover:text-gray-900 hover:bg-stone-100"}`}>
                {label}
              </a>
            );
          })}
        </div>

        {/* Search bar */}
        <div className="flex-1 max-w-sm hidden md:block">
          <div className="relative">
            <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" value={search} onChange={e => setSearch(e.target.value)}
              onKeyDown={handleSearch} placeholder="Search products…"
              className="w-full pl-9 pr-4 py-2 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-stone-400 bg-stone-50 focus:bg-white transition-all"
            />
          </div>
        </div>

        {/* Right actions */}
        <div className="flex items-center gap-2 ml-auto">
          <a href="cart.html" className="relative p-2 rounded-md hover:bg-stone-100 transition-colors text-gray-700">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 5h14.6M10 21a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg>
            {cartCount > 0 && <span className="absolute top-1 right-1 w-4 h-4 bg-sage text-white text-[10px] font-bold rounded-full flex items-center justify-center">{cartCount}</span>}
          </a>
          {user
            ? <a href="profile.html" className="w-8 h-8 bg-sage/20 rounded-full flex items-center justify-center text-sage font-bold text-sm">{user.full_name?.[0]?.toUpperCase() || user.name?.[0]?.toUpperCase()}</a>
            : <a href="login.html" className="px-4 py-2 bg-gray-900 text-white text-sm font-semibold rounded-lg">Sign In</a>}
        </div>
      </div>
    </nav>
  );
}

function Banner({ data }) {
  return (
    <div className="text-white rounded-2xl p-10 mx-0 flex items-center justify-between"style={{background: "linear-gradient(to right, #7a8c6e, #5a6b50)"}}>
      <div>
        <p className="text-white/70 text-sm uppercase tracking-widest mb-2">Featured Campaign</p>
        <h2 className="font-display text-3xl md:text-4xl font-bold mb-3">{data.title}</h2>
        <p className="text-white/80 max-w-md mb-5">{data.subtitle}</p>
        <a href="products.html" className="inline-block px-6 py-3 bg-white text-gray-900 font-semibold rounded-xl hover:bg-cream transition-all">{data.cta}</a>
      </div>
      <div className="text-8xl hidden md:block"></div>
        <img src="../assets/img/logo.png" alt="FiberNest" className="h-48 w-auto" />
      </div>
  );
}

function ProductCard({ p, onAdd }) {
  return (
    <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden hover:shadow-lg hover:-translate-y-1 transition-all group">
      <div className="relative aspect-square flex items-center justify-center text-5xl"
        style={{background: "linear-gradient(135deg, #f5f5f4, #e8dfd0)"}}>
        {p.image 
          ? <img src={p.image} alt={p.name} className="w-full h-full object-cover" /> 
          : <span className="text-5xl">{p.emoji || "🥥"}</span>
        }
        <span className={`absolute top-3 left-3 px-2 py-0.5 ${BADGE_COLOR[p.badge] || "bg-gray-500"} text-white text-[10px] font-bold rounded-full uppercase tracking-wider`}>{p.badge}</span>
      </div>
      <div className="p-4">
        <p className="text-[11px] text-gray-400 uppercase tracking-wider mb-0.5">{p.category}</p>
        <h3 className="font-semibold text-gray-900 text-sm leading-snug mb-3">{p.name}</h3>
        <div className="flex items-center justify-between">
          <span className="font-bold text-gray-900 text-base">₱{Number(p.price).toLocaleString()}</span>
          <button onClick={() => onAdd(p)} className="px-3 py-1.5 bg-sage text-white text-xs font-semibold rounded-lg hover:bg-sage-dark transition-all">Add to Cart</button>
        </div>
      </div>
    </div>
  );
}

function Section({ title, icon, products, onAdd }) {
  return (
    <div className="mb-14">
      <div className="flex items-center gap-3 mb-6">
        <span className="text-2xl">{icon}</span>
        <h2 className="font-display text-2xl font-bold text-gray-900">{title}</h2>
        <div className="flex-1 h-px bg-stone-200"></div>
        <a href="products.html" className="text-sm text-sage font-semibold hover:underline">See all →</a>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
        {products.map(p => <ProductCard key={p.id} p={p} onAdd={onAdd} />)}
      </div>
    </div>
  );
}

function App() {
  const [storefront, setStorefront] = useState(null);
  const [toast, setToast] = useState("");
  useEffect(() => {
    Api.get("/storefront")
    .then(d => setStorefront(d))
    .catch(() => setStorefront(MOCK));
  }, []);

  const addToCart = (p) => {
    Api.cart.add(p);
    setToast(`✅ "${p.name}" added to cart`);
    setTimeout(() => setToast(""), 3000);
  };

  const sf = storefront || MOCK;

  return (
    <div className="flex flex-col min-h-screen">
      <Navbar />
      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-lg">{toast}</div>
      )}
      <main className="flex-1">
        <div className="max-w-6xl mx-auto px-6 py-10">
          <div className="mb-10"><Banner data={sf.banner || MOCK.banner} /></div>
          <Section title="New Arrivals" products={sf.new || MOCK.new} onAdd={addToCart} />
          <Section title="Trending Now" products={sf.trending || MOCK.trending} onAdd={addToCart} />
          <Section title="Best Sellers" products={sf.bestseller || MOCK.bestseller} onAdd={addToCart} />
        </div>
      </main>
      <footer className="bg-gray-900 py-4 mt-auto">
        <p className="text-center text-xs text-gray-500">© 2025 FiberNest. For educational purposes only, and no copyright infringement is intended.</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
