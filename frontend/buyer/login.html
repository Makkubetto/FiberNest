<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiberNest – Sign In</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:["'Playfair Display'","serif"],sans:["'DM Sans'","sans-serif"]},colors:{sage:{DEFAULT:"#7a8c6e",dark:"#5a6b50",light:"#c5d0bc"},cream:"#f8f5f0",tan:"#e8dfd0"}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../api.js"></script>
</head>
<body class="bg-cream font-sans min-h-screen flex flex-col">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [form, setForm] = useState({ email:"", password:"" });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [showPw, setShowPw] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = async () => {
    setError(""); setLoading(true);
    try {
      // FastAPI OAuth2 token endpoint expects form data
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ username: form.email, password: form.password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Invalid credentials");
      Api.setToken(data.access_token);
      // fetch user profile
      const user = await Api.get("/users/me");
      Api.setUser(user);
      window.location.href = user.role === "seller" ? "../seller/seller-dashboard.html" : "index.html";
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="flex flex-col min-h-screen">
      {/* Minimal nav */}
      <nav className="bg-white border-b border-stone-200 h-16 flex items-center px-6">
        <a href="index.html" className="flex items-center gap-2">
          <div className="w-8 h-8 bg-sage rounded-lg flex items-center justify-center text-white text-sm">🌿</div>
          <span className="font-display font-bold text-gray-900 text-lg">FiberNest</span>
        </a>
      </nav>

      <main className="flex-1 flex items-center justify-center px-4 py-16">
        <div className="w-full max-w-md">
          <div className="text-center mb-8">
            <h1 className="font-display text-4xl font-bold text-gray-900 mb-2">Welcome back</h1>
            <p className="text-gray-400">Sign in to your FiberNest account</p>
          </div>

          <div className="bg-white rounded-2xl border border-stone-200 shadow-sm p-8">
            {error && (
              <div className="mb-5 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 flex items-center gap-2">
                <span>⚠️</span>{error}
              </div>
            )}

            <div className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Email Address</label>
                <input
                  type="email" value={form.email} placeholder="you@email.com"
                  onChange={e => set("email", e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleSubmit()}
                  className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20 transition-all"
                />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Password</label>
                <div className="relative">
                  <input
                    type={showPw ? "text" : "password"} value={form.password} placeholder="••••••••"
                    onChange={e => set("password", e.target.value)}
                    onKeyDown={e => e.key === "Enter" && handleSubmit()}
                    className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20 transition-all pr-12"
                  />
                  <button type="button" onClick={() => setShowPw(s => !s)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg">{showPw ? "🙈" : "👁️"}</button>
                </div>
              </div>
              <button
                onClick={handleSubmit} disabled={loading || !form.email || !form.password}
                className="w-full py-3.5 bg-gray-900 text-white font-semibold rounded-xl hover:bg-gray-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed mt-2"
              >
                {loading ? "Signing in…" : "Sign In"}
              </button>
            </div>

            <div className="mt-6 pt-6 border-t border-stone-100 text-center">
              <p className="text-sm text-gray-400">Don't have an account? <a href="register.html" className="text-sage font-semibold hover:underline">Create one</a></p>
            </div>

            <div className="mt-4 text-center">
              <p className="text-sm text-gray-400">Are you a seller? <a href="../seller/seller-login.html" className="text-sage font-semibold hover:underline">Seller Login →</a></p>
            </div>
          </div>

          <div className="mt-6 p-4 bg-sage/10 rounded-xl border border-sage/20 text-sm text-center text-gray-500">
            <strong className="text-sage">Demo credentials:</strong><br />
            Buyer: <code>buyer@fibernest.ph</code> / <code>password123</code>
          </div>
        </div>
      </main>

      <footer className="bg-gray-900 py-4">
        <p className="text-center text-xs text-gray-500">© 2025 FiberNest. For educational purposes only, and no copyright infringement is intended.</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
