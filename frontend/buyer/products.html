<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiberNest – Products</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:["'Playfair Display'","serif"],sans:["'DM Sans'","sans-serif"]},colors:{sage:{DEFAULT:"#7a8c6e",dark:"#5a6b50",light:"#c5d0bc"},cream:"#f8f5f0",tan:"#e8dfd0"}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../api.js"></script>
</head>
<body class="bg-cream font-sans min-h-screen flex flex-col">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const MOCK_PRODUCTS = [
  { id:1, name:"Coco Peat Block 5kg", price:350, category:"Gardening", stock:120, description:"Premium compressed coco peat for soil amendment.", emoji:"🧱" },
  { id:2, name:"Coir Erosion Control Mat 1×2m", price:980, category:"Construction", stock:45, description:"Biodegradable erosion mat for slopes and embankments.", emoji:"🌾" },
  { id:3, name:"Natural Fiber Doormat 40×60cm", price:495, category:"Home", stock:88, description:"Durable natural coir doormat with non-slip backing.", emoji:"🏠" },
  { id:4, name:"Coco Grow Bag Set (5pcs)", price:399, category:"Gardening", stock:200, description:"Ready-to-use grow bags filled with coco peat.", emoji:"🌿" },
  { id:5, name:"Bulk Coir Fiber 10kg", price:750, category:"Industrial", stock:60, description:"Raw loose coir fiber for industrial and craft use.", emoji:"📦" },
  { id:6, name:"Coir Rope 50m Roll", price:380, category:"Industrial", stock:75, description:"Strong twisted coir rope, weather resistant.", emoji:"🪢" },
  { id:7, name:"Coir Log Erosion Control 3m", price:1450, category:"Construction", stock:22, description:"Biodegradable log for riverbank and slope erosion.", emoji:"🪵" },
  { id:8, name:"Seedling Coir Tray 50-cells", price:280, category:"Gardening", stock:150, description:"Biodegradable seedling tray for fast transplanting.", emoji:"🌱" },
  { id:9, name:"Coir Hanging Basket Liner", price:220, category:"Home", stock:95, description:"Natural liner for hanging flower baskets.", emoji:"🧺" },
  { id:10, name:"Coco Peat Disc Set (12pcs)", price:195, category:"Gardening", stock:300, description:"Compressed coco peat discs, expands with water.", emoji:"💿" },
  { id:11, name:"Coir Geotextile Roll 2m×10m", price:2200, category:"Construction", stock:15, description:"Heavy-duty geotextile for large slope stabilization.", emoji:"🗂️" },
  { id:12, name:"Coir Plant Pot Set (3pcs)", price:320, category:"Home", stock:110, description:"Biodegradable coir pots for eco-friendly gardening.", emoji:"🪴" },
];

const CATEGORIES = ["All","Gardening","Construction","Home","Industrial"];
const SORT_OPTIONS = [
  { value:"default", label:"Default" },
  { value:"price_asc", label:"Price: Low to High" },
  { value:"price_desc", label:"Price: High to Low" },
  { value:"name_asc", label:"Name: A–Z" },
];

function Navbar() {
  const [cartCount, setCartCount] = useState(Api.cart.count());
  const user = Api.getUser();
  return (
    <nav className="bg-white border-b border-stone-200 sticky top-0 z-50 h-16 flex items-center">
      <div className="max-w-6xl mx-auto px-6 w-full flex items-center justify-between">
        <a href="index.html" className="flex items-center gap-2">
          <div className="w-8 h-8 bg-sage rounded-lg flex items-center justify-center text-white text-sm">🌿</div>
          <div><span className="font-display font-bold text-gray-900 text-lg">FiberNest</span><span className="block text-[10px] text-gray-400 tracking-widest uppercase leading-none">Coir Products</span></div>
        </a>
        <div className="hidden md:flex items-center gap-1">
          {[["Home","index.html"],["Shop","products.html"],["Storefront","storefront.html"]].map(([l,h]) => (
            <a key={l} href={h} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${h==="products.html"?"text-gray-900 bg-stone-100":"text-gray-500 hover:text-gray-900 hover:bg-stone-100"}`}>{l}</a>
          ))}
        </div>
        <div className="flex items-center gap-2">
          <a href="cart.html" className="relative p-2 rounded-md hover:bg-stone-100 transition-colors text-gray-700">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 5h14.6M10 21a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg>
            {cartCount > 0 && <span className="absolute top-1 right-1 w-4 h-4 bg-sage text-white text-[10px] font-bold rounded-full flex items-center justify-center">{cartCount}</span>}
          </a>
          {user ? <a href="profile.html" className="w-8 h-8 bg-sage/20 rounded-full flex items-center justify-center text-sage font-bold text-sm">{user.name?.[0]?.toUpperCase()}</a>
            : <a href="login.html" className="px-4 py-2 bg-gray-900 text-white text-sm font-semibold rounded-lg">Sign In</a>}
        </div>
      </div>
    </nav>
  );
}

function App() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [category, setCategory] = useState("All");
  const [sort, setSort] = useState("default");
  const [toast, setToast] = useState("");
  const [cartCount, setCartCount] = useState(Api.cart.count());

  useEffect(() => {
    Api.get("/products")
      .then(d => setProducts(d.products || d))
      .catch(() => setProducts(MOCK_PRODUCTS))
      .finally(() => setLoading(false));
  }, []);

  const filtered = useMemo(() => {
    let p = [...products];
    if (search) p = p.filter(x => x.name.toLowerCase().includes(search.toLowerCase()) || x.category?.toLowerCase().includes(search.toLowerCase()));
    if (category !== "All") p = p.filter(x => x.category === category);
    if (sort === "price_asc") p.sort((a,b) => a.price - b.price);
    else if (sort === "price_desc") p.sort((a,b) => b.price - a.price);
    else if (sort === "name_asc") p.sort((a,b) => a.name.localeCompare(b.name));
    return p;
  }, [products, search, category, sort]);

  const addToCart = (p) => {
    Api.cart.add(p);
    setCartCount(Api.cart.count());
    setToast(`✅ "${p.name}" added to cart`);
    setTimeout(() => setToast(""), 3000);
  };

  return (
    <div className="flex flex-col min-h-screen">
      <Navbar />
      {toast && <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-lg">{toast}</div>}

      <main className="flex-1 max-w-6xl mx-auto px-6 py-10 w-full">
        <div className="mb-8">
          <h1 className="font-display text-4xl font-bold text-gray-900 mb-1">All Products</h1>
          <p className="text-gray-400">Browse our full range of sustainable coconut coir products.</p>
        </div>

        {/* Filters */}
        <div className="flex flex-col md:flex-row gap-4 mb-8">
          <div className="relative flex-1">
            <svg className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search products…"
              className="w-full pl-10 pr-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20 bg-white" />
          </div>
          <div className="flex gap-3">
            <select value={sort} onChange={e => setSort(e.target.value)} className="px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage bg-white appearance-none pr-8">
              {SORT_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
        </div>

        {/* Category tabs */}
        <div className="flex gap-2 flex-wrap mb-8">
          {CATEGORIES.map(c => (
            <button key={c} onClick={() => setCategory(c)}
              className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${category===c?"bg-gray-900 text-white":"bg-white border border-stone-200 text-gray-500 hover:border-sage hover:text-sage"}`}>
              {c}
            </button>
          ))}
        </div>

        {loading ? (
          <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
            {[1,2,3,4,5,6,7,8].map(i => <div key={i} className="h-64 rounded-2xl bg-stone-200 animate-pulse"></div>)}
          </div>
        ) : filtered.length === 0 ? (
          <div className="text-center py-20">
            <p className="text-5xl mb-4">🔍</p>
            <p className="font-display text-xl font-semibold text-gray-700">No products found</p>
            <p className="text-gray-400 mt-2">Try adjusting your search or filters</p>
          </div>
        ) : (
          <>
            <p className="text-sm text-gray-400 mb-5">{filtered.length} product{filtered.length !== 1 ? "s" : ""} found</p>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
              {filtered.map((p, i) => (
                <div key={p.id} className="group bg-white rounded-2xl border border-stone-200 overflow-hidden hover:shadow-lg hover:-translate-y-1 transition-all">
                  <div className="relative aspect-square bg-gradient-to-br from-stone-100 to-tan/40 flex items-center justify-center text-5xl">
                    {p.image ? <img src={p.image} alt={p.name} className="w-full h-full object-cover" /> : (p.emoji || "🥥")}
                    {p.stock < 10 && p.stock > 0 && <span className="absolute top-3 right-3 px-2 py-0.5 bg-red-500 text-white text-[10px] font-bold rounded-full">Low Stock</span>}
                    {p.stock === 0 && <div className="absolute inset-0 bg-white/70 flex items-center justify-center"><span className="font-semibold text-gray-500">Out of Stock</span></div>}
                  </div>
                  <div className="p-4">
                    <p className="text-[11px] text-gray-400 uppercase tracking-wider mb-0.5">{p.category}</p>
                    <h3 className="font-semibold text-gray-900 text-sm leading-snug mb-1">{p.name}</h3>
                    {p.description && <p className="text-xs text-gray-400 mb-3 line-clamp-2">{p.description}</p>}
                    <div className="flex items-center justify-between">
                      <span className="font-bold text-gray-900">₱{Number(p.price).toLocaleString()}</span>
                      <button onClick={() => addToCart(p)} disabled={p.stock === 0}
                        className="px-3 py-1.5 bg-sage text-white text-xs font-semibold rounded-lg hover:bg-sage-dark transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                        Add to Cart
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </main>

      <footer className="bg-gray-900 py-4 mt-auto">
        <p className="text-center text-xs text-gray-500">© 2025 FiberNest. For educational purposes only, and no copyright infringement is intended.</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
