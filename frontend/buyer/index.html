<script>
  document.addEventListener("click", function(e) {
    const link = e.target.closest("a[href]");
    if (!link) return;
    const href = link.getAttribute("href");
    if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto")) return;
    e.preventDefault();
    document.body.style.transition = "opacity 0.3s ease";
    document.body.style.opacity = "0";
    setTimeout(() => { window.location.href = href; }, 300);
  });

// ── Hero Slideshow ──────────────────────────────────────────
function HeroSlideshow() {
  const [current, setCurrent] = useState(0);
  const [animating, setAnimating] = useState(false);
  const [direction, setDirection] = useState("next");
  const timerRef = useRef(null);

  const goTo = (index, dir = "next") => {
    if (animating) return;
    setDirection(dir);
    setAnimating(true);
    setTimeout(() => {
      setCurrent(index);
      setAnimating(false);
    }, 400);
  };

  const next = () => goTo((current + 1) % SLIDES.length, "next");
  const prev = () => goTo((current - 1 + SLIDES.length) % SLIDES.length, "prev");

  // Auto-slide every 5 seconds
  useEffect(() => {
    timerRef.current = setInterval(next, 5000);
    return () => clearInterval(timerRef.current);
  }, [current]);

  const resetTimer = () => {
    clearInterval(timerRef.current);
    timerRef.current = setInterval(next, 5000);
  };

  const handleNext = () => { next(); resetTimer(); };
  const handlePrev = () => { prev(); resetTimer(); };
  const handleDot  = (i) => { goTo(i, i > current ? "next" : "prev"); resetTimer(); };

  const slide = SLIDES[current];

  return (
    <section className={`pt-16 min-h-[92vh] flex items-center relative overflow-hidden transition-colors duration-700 ${slide.bg}`}>
      {/* Background decoration */}
      <div className="absolute inset-0 pointer-events-none overflow-hidden">
        <div className="absolute top-[-80px] right-[-80px] w-[500px] h-[500px] rounded-full bg-sage/10 transition-all duration-700"></div>
        <div className="absolute bottom-[-60px] left-[-60px] w-[350px] h-[350px] rounded-full bg-tan/60 transition-all duration-700"></div>
      </div>

      {/* Slide content */}
      <div className={`max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center relative z-10 py-20 w-full transition-all duration-400 ${animating ? "opacity-0 translate-x-8" : "opacity-100 translate-x-0"}`}
        style={{ transition: "opacity 0.4s ease, transform 0.4s ease" }}>

        {/* Left — Text */}
        <div>
          <span className="inline-block px-3 py-1 bg-sage/15 text-sage text-xs font-semibold rounded-full tracking-wider uppercase mb-5">
            {slide.badge}
          </span>
          <h1 className="font-display text-5xl md:text-6xl font-bold text-gray-900 leading-[1.1] mb-6">
            {slide.title.map((line, i) => (
              <span key={i}>
                {i === slide.titleAccent ? <span className="text-sage">{line}</span> : line}
                {i < slide.title.length - 1 && <br />}
              </span>
            ))}
          </h1>
          <p className="text-gray-500 text-lg leading-relaxed mb-8 max-w-md">{slide.desc}</p>
          <div className="flex flex-wrap gap-3">
            <a href={slide.cta.href} className="px-7 py-3.5 bg-gray-900 text-white font-semibold rounded-xl hover:bg-gray-700 transition-all hover:-translate-y-0.5 shadow-lg shadow-gray-900/20">
              {slide.cta.label}
            </a>
            <a href={slide.cta2.href} className="px-7 py-3.5 bg-white border border-stone-200 text-gray-700 font-semibold rounded-xl hover:bg-stone-50 transition-all">
              {slide.cta2.label}
            </a>
          </div>
        </div>

        {/* Right — Visual */}
        <div className="relative hidden md:block">
          <div className="w-full aspect-square rounded-3xl overflow-hidden"
          style={{ background: slide.accentBg }}>
          {slide.image
            ? <img src={slide.image} alt={slide.visual.label} className="w-full h-full object-cover"
            style={{
              maskImage: "radial-gradient(ellipse 80% 80% at 50% 50%, black 50%, transparent 100%)",
              WebkitMaskImage: "radial-gradient(ellipse 80% 80% at 50% 50%, black 50%, transparent 100%)",
            }}
          />
        : (
          <div className="w-full h-full flex items-center justify-center">
            <div className="text-center">
              <div className="text-[120px] mb-4" style={{ filter: "drop-shadow(0 8px 24px rgba(0,0,0,0.1))" }}>
                {slide.visual.emoji}
              </div>
              <p className="font-display text-xl text-gray-600 font-semibold">{slide.visual.label}</p>
              <p className="text-sm text-gray-400 mt-1">{slide.visual.sub}</p>
            </div>
          </div>
          )
        }
          </div>
          {/* Floating badges */}
          <div className="absolute -bottom-4 -left-4 bg-white rounded-2xl shadow-lg p-4 flex items-center gap-3">
            <div className="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center text-xl">🌱</div>
            <div><p className="text-xs text-gray-400">Eco Score</p><p className="font-bold text-gray-900">Excellent</p></div>
          </div>
          <div className="absolute -top-4 -right-4 bg-white rounded-2xl shadow-lg p-4">
            <p className="text-xs text-gray-400 mb-1">Top Rated</p>
            <div className="flex gap-0.5 text-amber-400">{"★★★★★"}</div>
          </div>
          {/* Slide number */}
          <div className="absolute top-4 right-4 bg-white/80 backdrop-blur-sm rounded-full px-3 py-1 text-xs font-semibold text-gray-500">
            {current + 1} / {SLIDES.length}
          </div>
        </div>
      </div>

      {/* Arrow buttons */}
      <button onClick={handlePrev}
        className="absolute left-4 top-1/2 -translate-y-1/2 z-20 w-11 h-11 bg-white/90 hover:bg-white rounded-full shadow-md flex items-center justify-center text-gray-700 hover:text-gray-900 transition-all hover:shadow-lg">
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button onClick={handleNext}
        className="absolute right-4 top-1/2 -translate-y-1/2 z-20 w-11 h-11 bg-white/90 hover:bg-white rounded-full shadow-md flex items-center justify-center text-gray-700 hover:text-gray-900 transition-all hover:shadow-lg">
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
      </button>

      {/* Dots */}
      <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 flex items-center gap-2">
        {SLIDES.map((_, i) => (
          <button key={i} onClick={() => handleDot(i)}
            className={`rounded-full transition-all duration-300 ${i === current ? "w-8 h-2.5 bg-sage" : "w-2.5 h-2.5 bg-stone-300 hover:bg-stone-400"}`}>
          </button>
        ))}
      </div>
    </section>
  );
}
