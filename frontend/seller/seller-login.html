<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiberNest – Seller Login</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:["'Playfair Display'","serif"],sans:["'DM Sans'","sans-serif"]},colors:{sage:{DEFAULT:"#7a8c6e",dark:"#5a6b50"},cream:"#f8f5f0"}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../api.js"></script>
</head>
<body class="font-sans min-h-screen flex">
<div id="root" class="w-full"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [form, setForm] = useState({ email:"", password:"" });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [showPw, setShowPw] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSubmit = async () => {
    setError(""); setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ username: form.email, password: form.password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Invalid credentials");
      Api.setToken(data.access_token);
      const user = await Api.get("/users/me");
      if (user.role !== "seller") throw new Error("This account is not a seller account.");
      Api.setUser(user);
      window.location.href = "seller-dashboard.html";
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="flex min-h-screen">
      {/* Left panel */}
      <div className="hidden md:flex md:w-1/2 bg-gray-900 flex-col items-center justify-center p-12 relative overflow-hidden">
        <div className="absolute inset-0 opacity-10">
          <div className="absolute top-20 left-20 w-64 h-64 rounded-full border-2 border-white"></div>
          <div className="absolute bottom-20 right-20 w-40 h-40 rounded-full border border-white"></div>
          <div className="absolute top-1/2 left-1/3 w-32 h-32 rounded-full bg-white"></div>
        </div>
        <div className="relative z-10 text-center text-white">
          <div className="w-20 h-20 bg-sage rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6">🌿</div>
          <h1 className="font-display text-4xl font-bold mb-3">FiberNest</h1>
          <p className="text-gray-400 text-lg mb-8">Seller Dashboard</p>
          <div className="space-y-4 text-left bg-white/5 rounded-2xl p-6">
            {[["📦","Manage Inventory","Add, edit, and track products"],["🏪","Customize Storefront","Set banners and featured items"],["📊","View Reports","Track daily and monthly sales"]].map(([ico,title,desc]) => (
              <div key={title} className="flex items-start gap-3">
                <span className="text-xl mt-0.5">{ico}</span>
                <div><p className="font-semibold text-sm">{title}</p><p className="text-xs text-gray-400">{desc}</p></div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Right panel */}
      <div className="flex-1 flex flex-col items-center justify-center bg-cream px-8 py-16">
        <div className="w-full max-w-md">
          <div className="md:hidden flex items-center gap-2 mb-8">
            <div className="w-8 h-8 bg-sage rounded-lg flex items-center justify-center text-white text-sm">🌿</div>
            <span className="font-display font-bold text-gray-900 text-xl">FiberNest</span>
          </div>
          <h2 className="font-display text-3xl font-bold text-gray-900 mb-1">Seller Portal</h2>
          <p className="text-gray-400 mb-8">Sign in to manage your store</p>

          <div className="bg-white rounded-2xl border border-stone-200 shadow-sm p-8">
            {error && <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">⚠️ {error}</div>}
            <div className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Email</label>
                <input type="email" value={form.email} placeholder="seller@fibernest.ph" onChange={e => set("email",e.target.value)}
                  onKeyDown={e => e.key==="Enter" && handleSubmit()}
                  className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20" />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Password</label>
                <div className="relative">
                  <input type={showPw?"text":"password"} value={form.password} placeholder="••••••••" onChange={e => set("password",e.target.value)}
                    onKeyDown={e => e.key==="Enter" && handleSubmit()}
                    className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20 pr-12" />
                  <button onClick={() => setShowPw(s=>!s)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-base">{showPw?"🙈":"👁️"}</button>
                </div>
              </div>
              <button onClick={handleSubmit} disabled={loading || !form.email || !form.password}
                className="w-full py-3.5 bg-gray-900 text-white font-semibold rounded-xl hover:bg-gray-700 transition-all disabled:opacity-50">
                {loading ? "Signing in…" : "Sign In to Dashboard"}
              </button>
            </div>
            <p className="text-center text-sm text-gray-400 mt-6">Are you a buyer? <a href="../buyer/login.html" className="text-sage font-semibold hover:underline">Buyer Login →</a></p>
          </div>

          <div className="mt-6 p-4 bg-sage/10 rounded-xl border border-sage/20 text-sm text-center text-gray-500">
            <strong className="text-sage">Demo:</strong> seller@fibernest.ph / seller123
          </div>
        </div>
        <footer className="mt-auto pt-8">
          <p className="text-xs text-gray-400 text-center">© 2025 FiberNest. For educational purposes only, and no copyright infringement is intended.</p>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
