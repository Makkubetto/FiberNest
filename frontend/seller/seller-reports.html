<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiberNest – Reports</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:["Inter","sans-serif"],sans:["DM Sans","sans-serif"]},colors:{sage:{DEFAULT:"#7a8c6e",dark:"#5a6b50"},cream:"#f8f5f0"}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../api.js"></script>
  <script type="text/babel" src="seller-layout.js"></script>
</head>
<body class="font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const MOCK_SALES = {
  today: { total: 4850, orders: 7, avg: 692.86 },
  month: { total: 92400, orders: 134, avg: 689.55 },
  daily: [
    { day:"Jun 1",  sales:3200 },{ day:"Jun 2",  sales:4150 },{ day:"Jun 3",  sales:2800 },
    { day:"Jun 4",  sales:5100 },{ day:"Jun 5",  sales:3850 },{ day:"Jun 6",  sales:4200 },
    { day:"Jun 7",  sales:4600 },{ day:"Jun 8",  sales:5300 },{ day:"Jun 9",  sales:3700 },
    { day:"Jun 10", sales:4850 },
  ],
  top_products: [
    { name:"Coco Peat Block 5kg",     qty_sold:48, revenue:16800 },
    { name:"Grow Bag Set (5pcs)",     qty_sold:35, revenue:13965 },
    { name:"Coir Erosion Mat 1×2m",   qty_sold:21, revenue:20580 },
    { name:"Natural Fiber Doormat",   qty_sold:19, revenue:9405  },
    { name:"Bulk Coir Fiber 10kg",    qty_sold:15, revenue:11250 },
  ],
  by_category: [
    { cat:"Gardening",    revenue:42000, pct:45 },
    { cat:"Construction", revenue:31000, pct:34 },
    { cat:"Home",         revenue:12000, pct:13 },
    { cat:"Industrial",   revenue:7400,  pct:8  },
  ],
};

const MOCK_INVENTORY = [
  { name:"Coco Peat Block 5kg",          category:"Gardening",    stock:120, price:350,  value:42000 },
  { name:"Coir Erosion Control Mat 1×2m",category:"Construction", stock:45,  price:980,  value:44100 },
  { name:"Natural Fiber Doormat 40×60cm",category:"Home",         stock:88,  price:495,  value:43560 },
  { name:"Coco Grow Bag Set (5pcs)",      category:"Gardening",    stock:200, price:399,  value:79800 },
  { name:"Bulk Coir Fiber 10kg",          category:"Industrial",   stock:5,   price:750,  value:3750  },
  { name:"Coir Rope 50m Roll",            category:"Industrial",   stock:75,  price:380,  value:28500 },
];

function MiniBar({ pct, color="bg-sage" }) {
  return (
    <div className="w-full bg-stone-100 rounded-full h-2">
      <div className={`${color} h-2 rounded-full transition-all duration-700`} style={{ width: `${pct}%` }}></div>
    </div>
  );
}

function SalesChart({ data }) {
  const max = Math.max(...data.map(d => d.sales));
  return (
    <div className="flex items-end gap-1.5 h-32">
      {data.map((d, i) => {
        const h = Math.round((d.sales / max) * 100);
        const isLast = i === data.length - 1;
        return (
          <div key={i} className="flex-1 flex flex-col items-center gap-1 group">
            <div className="w-full flex items-end justify-center" style={{ height:"100px" }}>
              <div className={`w-full rounded-t-md transition-all ${isLast?"bg-sage":"bg-sage/30 group-hover:bg-sage/50"}`} style={{ height: `${h}%` }}
                title={`₱${d.sales.toLocaleString()}`}></div>
            </div>
            <span className="text-[9px] text-gray-400 whitespace-nowrap">{d.day.split(" ")[1]}</span>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [data, setData] = useState(null);
  const [inventory, setInventory] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState("sales");

  useEffect(() => {
    Promise.all([
      Api.get("/seller/reports").catch(() => MOCK_SALES),
      Api.get("/seller/inventory-report").catch(() => MOCK_INVENTORY),
    ]).then(([r, inv]) => { setData(r); setInventory(inv.products || inv); })
    .finally(() => setLoading(false));
  }, []);

  const d = data || MOCK_SALES;
  const inv = inventory.length ? inventory : MOCK_INVENTORY;
  const today = new Date().toLocaleDateString("en-PH",{year:"numeric",month:"long",day:"numeric"});

  return (
    <SellerLayout active="Reports">
      <div className="max-w-5xl">
        <div className="flex items-center justify-between mb-8">
          <div>
            <h1 className="font-sans text-3xl font-bold text-gray-900">Reports</h1>
            <p className="text-gray-400 mt-1">As of {today}</p>
          </div>
          <button onClick={() => window.print()} className="px-4 py-2 bg-stone-100 text-gray-700 text-sm font-semibold rounded-xl hover:bg-stone-200 transition-all">🖨️ Print</button>
        </div>

        {/* Tabs */}
        <div className="flex gap-1 bg-white border border-stone-200 rounded-xl p-1 mb-6 w-fit">
          {[["sales","📊 Sales Report"],["inventory","📦 Inventory Report"]].map(([t,label]) => (
            <button key={t} onClick={() => setActiveTab(t)}
              className={`px-5 py-2.5 rounded-lg text-sm font-semibold transition-all ${activeTab===t?"bg-gray-900 text-white":"text-gray-500 hover:text-gray-700"}`}>
              {label}
            </button>
          ))}
        </div>

        {activeTab === "sales" && (
          <div className="space-y-6">
            {/* Summary cards */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              {[
                { label:"Today's Sales",   value:`₱${d.today?.total?.toLocaleString()}`,   sub:`${d.today?.orders} orders`,   icon:"💰", color:"bg-green-100" },
                { label:"Avg. Order Today", value:`₱${Math.round(d.today?.avg)?.toLocaleString()}`, sub:"per order",             icon:"📋", color:"bg-blue-100" },
                { label:"This Month",       value:`₱${d.month?.total?.toLocaleString()}`,   sub:`${d.month?.orders} orders`,   icon:"📅", color:"bg-purple-100" },
                { label:"Monthly Avg.",     value:`₱${Math.round(d.month?.avg)?.toLocaleString()}`, sub:"per order",             icon:"📊", color:"bg-amber-100" },
              ].map(s => (
                <div key={s.label} className="bg-white rounded-2xl border border-stone-200 p-5">
                  <div className={`w-10 h-10 ${s.color} rounded-xl flex items-center justify-center text-lg mb-3`}>{s.icon}</div>
                  <p className="text-xl font-bold text-gray-900">{s.value}</p>
                  <p className="text-xs font-medium text-gray-600 mt-0.5">{s.label}</p>
                  <p className="text-xs text-gray-400 mt-0.5">{s.sub}</p>
                </div>
              ))}
            </div>

            <div className="grid md:grid-cols-2 gap-6">
              {/* Sales chart */}
              <div className="bg-white rounded-2xl border border-stone-200 p-6">
                <h3 className="font-sans font-bold text-gray-900 mb-1">Daily Sales (June)</h3>
                <p className="text-xs text-gray-400 mb-5">Revenue per day in ₱</p>
                <SalesChart data={d.daily || MOCK_SALES.daily} />
              </div>

              {/* By category */}
              <div className="bg-white rounded-2xl border border-stone-200 p-6">
                <h3 className="font-sans font-bold text-gray-900 mb-5">Revenue by Category</h3>
                <div className="space-y-4">
                  {(d.by_category || MOCK_SALES.by_category).map(c => (
                    <div key={c.cat}>
                      <div className="flex items-center justify-between mb-1.5">
                        <span className="text-sm font-medium text-gray-700">{c.cat}</span>
                        <span className="text-sm font-bold text-gray-900">₱{c.revenue.toLocaleString()} <span className="font-normal text-gray-400 text-xs">({c.pct}%)</span></span>
                      </div>
                      <MiniBar pct={c.pct} />
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Top products */}
            <div className="bg-white rounded-2xl border border-stone-200">
              <div className="p-5 border-b border-stone-100">
                <h3 className="font-sans font-bold text-gray-900">Top Selling Products (This Month)</h3>
              </div>
              <table className="w-full text-sm">
                <thead className="bg-stone-50">
                  <tr>{["Rank","Product","Units Sold","Revenue","Share"].map(h=>(
                    <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">{h}</th>
                  ))}</tr>
                </thead>
                <tbody className="divide-y divide-stone-100">
                  {(d.top_products || MOCK_SALES.top_products).map((p, i) => {
                    const totalRev = (d.top_products || MOCK_SALES.top_products).reduce((s,x) => s+x.revenue, 0);
                    return (
                      <tr key={p.name} className="hover:bg-stone-50">
                        <td className="px-4 py-3">
                          <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${i===0?"bg-amber-400 text-white":i===1?"bg-gray-300 text-gray-700":i===2?"bg-amber-700/40 text-amber-900":"bg-stone-100 text-gray-500"}`}>{i+1}</span>
                        </td>
                        <td className="px-4 py-3 font-medium text-gray-900">{p.name}</td>
                        <td className="px-4 py-3 text-gray-600">{p.qty_sold} pcs</td>
                        <td className="px-4 py-3 font-bold text-gray-900">₱{p.revenue.toLocaleString()}</td>
                        <td className="px-4 py-3 w-32">
                          <div className="flex items-center gap-2">
                            <MiniBar pct={Math.round(p.revenue/totalRev*100)} />
                            <span className="text-xs text-gray-400 whitespace-nowrap">{Math.round(p.revenue/totalRev*100)}%</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {activeTab === "inventory" && (
          <div className="space-y-6">
            {/* Inventory summary */}
            <div className="grid grid-cols-3 gap-4">
              {[
                { label:"Total SKUs",        value: inv.length,                                                  icon:"📦", color:"bg-blue-100" },
                { label:"Total Stock Value", value:`₱${inv.reduce((s,p)=>s+(p.stock*p.price),0).toLocaleString()}`, icon:"💰", color:"bg-green-100" },
                { label:"Items Low/Out",     value: inv.filter(p=>p.stock<=10).length,                          icon:"⚠️", color:"bg-amber-100" },
              ].map(s => (
                <div key={s.label} className="bg-white rounded-2xl border border-stone-200 p-5">
                  <div className={`w-10 h-10 ${s.color} rounded-xl flex items-center justify-center text-lg mb-3`}>{s.icon}</div>
                  <p className="text-xl font-bold text-gray-900">{s.value}</p>
                  <p className="text-xs font-medium text-gray-600 mt-0.5">{s.label}</p>
                </div>
              ))}
            </div>

            {/* Inventory table */}
            <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
              <div className="p-5 border-b border-stone-100">
                <h3 className="font-sans font-bold text-gray-900">Inventory Report</h3>
              </div>
              <table className="w-full text-sm">
                <thead className="bg-stone-50">
                  <tr>{["Product","Category","Unit Price","Stock Qty","Stock Value","Status"].map(h=>(
                    <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">{h}</th>
                  ))}</tr>
                </thead>
                <tbody className="divide-y divide-stone-100">
                  {inv.map(p => (
                    <tr key={p.name} className={`hover:bg-stone-50 ${p.stock === 0 ? "bg-red-50/30" : p.stock <= 10 ? "bg-amber-50/30" : ""}`}>
                      <td className="px-4 py-3 font-medium text-gray-900">{p.name}</td>
                      <td className="px-4 py-3 text-gray-500">{p.category}</td>
                      <td className="px-4 py-3 font-semibold text-gray-900">₱{Number(p.price).toLocaleString()}</td>
                      <td className="px-4 py-3 font-medium text-gray-800">{p.stock}</td>
                      <td className="px-4 py-3 font-bold text-gray-900">₱{(p.stock * p.price).toLocaleString()}</td>
                      <td className="px-4 py-3">
                        {p.stock === 0
                          ? <span className="px-2 py-1 bg-red-100 text-red-600 rounded-full text-xs font-semibold">Out of Stock</span>
                          : p.stock <= 10
                          ? <span className="px-2 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-semibold">Low Stock</span>
                          : <span className="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold">Good</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
                <tfoot className="bg-stone-50 border-t-2 border-stone-200">
                  <tr>
                    <td colSpan={4} className="px-4 py-3 font-bold text-gray-900 text-sm">Total</td>
                    <td className="px-4 py-3 font-bold text-gray-900 text-sm">₱{inv.reduce((s,p)=>s+(p.stock*p.price),0).toLocaleString()}</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        )}
      </div>
    </SellerLayout>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
