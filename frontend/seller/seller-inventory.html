<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiberNest – Inventory</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:["'Playfair Display'","serif"],sans:["'DM Sans'","sans-serif"]},colors:{sage:{DEFAULT:"#7a8c6e",dark:"#5a6b50"},cream:"#f8f5f0"}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../api.js"></script>
  <script type="text/babel" src="seller-layout.js"></script>
</head>
<body class="font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CATEGORIES = ["Gardening","Construction","Home","Industrial"];
const UNITS = ["kg","pcs","rolls","sets","meters","bags"];
const BLANK = { name:"", category:"Gardening", price:"", stock:"", unit:"pcs", description:"" };

const MOCK_PRODUCTS = [
  { id:1, name:"Coco Peat Block 5kg",          category:"Gardening",    price:350,  stock:120, unit:"pcs", description:"Premium compressed coco peat." },
  { id:2, name:"Coir Erosion Control Mat 1×2m", category:"Construction", price:980,  stock:45,  unit:"pcs", description:"Biodegradable erosion mat." },
  { id:3, name:"Natural Fiber Doormat 40×60cm", category:"Home",         price:495,  stock:88,  unit:"pcs", description:"Durable natural coir doormat." },
  { id:4, name:"Coco Grow Bag Set (5pcs)",       category:"Gardening",    price:399,  stock:200, unit:"sets", description:"Ready-to-use grow bags." },
  { id:5, name:"Bulk Coir Fiber 10kg",           category:"Industrial",   price:750,  stock:5,   unit:"bags", description:"Raw loose coir fiber." },
  { id:6, name:"Coir Rope 50m Roll",             category:"Industrial",   price:380,  stock:75,  unit:"rolls", description:"Strong twisted coir rope." },
];

function Modal({ title, onClose, children }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40">
      <div className="bg-white rounded-2xl border border-stone-200 w-full max-w-lg shadow-xl">
        <div className="flex items-center justify-between p-5 border-b border-stone-100">
          <h3 className="font-display font-bold text-gray-900 text-lg">{title}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">×</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function ProductForm({ form, setForm, onSave, onCancel, saving }) {
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  return (
    <div className="space-y-4">
      <div>
        <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Product Name *</label>
        <input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Coco Peat Block 5kg"
          className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20" />
      </div>
      <div className="grid grid-cols-2 gap-4">
        <div>
          <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Category</label>
          <select value={form.category} onChange={e=>set("category",e.target.value)}
            className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage bg-white appearance-none">
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Unit</label>
          <select value={form.unit} onChange={e=>set("unit",e.target.value)}
            className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage bg-white appearance-none">
            {UNITS.map(u=><option key={u}>{u}</option>)}
          </select>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-4">
        <div>
          <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Price (₱) *</label>
          <input type="number" value={form.price} onChange={e=>set("price",e.target.value)} placeholder="0.00" min="0"
            className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20" />
        </div>
        <div>
          <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Stock Qty *</label>
          <input type="number" value={form.stock} onChange={e=>set("stock",e.target.value)} placeholder="0" min="0"
            className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20" />
        </div>
      </div>
      <div>
        <label className="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5">Description</label>
        <textarea value={form.description} onChange={e=>set("description",e.target.value)} rows={2} placeholder="Short product description…"
          className="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/20 resize-none" />
      </div>
      <div className="flex gap-3 pt-2">
        <button onClick={onCancel} className="flex-1 py-3 bg-stone-100 text-gray-700 font-semibold rounded-xl hover:bg-stone-200 transition-all text-sm">Cancel</button>
        <button onClick={onSave} disabled={saving || !form.name || !form.price || form.stock === ""}
          className="flex-1 py-3 bg-gray-900 text-white font-semibold rounded-xl hover:bg-gray-700 transition-all text-sm disabled:opacity-50">
          {saving ? "Saving…" : "Save Product"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("All");
  const [modal, setModal] = useState(null); // null | "add" | product (for edit)
  const [form, setForm] = useState(BLANK);
  const [saving, setSaving] = useState(false);
  const [delId, setDelId] = useState(null);
  const [toast, setToast] = useState("");

  useEffect(() => {
    Api.get("/products").then(d=>setProducts(d.products||d)).catch(()=>setProducts(MOCK_PRODUCTS)).finally(()=>setLoading(false));
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""),3000); };

  const openAdd = () => { setForm(BLANK); setModal("add"); };
  const openEdit = (p) => { setForm({ ...p, price: String(p.price), stock: String(p.stock) }); setModal(p); };
  const closeModal = () => { setModal(null); setForm(BLANK); };

  const saveProduct = async () => {
    setSaving(true);
    const payload = { ...form, price: Number(form.price), stock: Number(form.stock) };
    try {
      if (modal === "add") {
        const created = await Api.post("/products", payload);
        setProducts(p => [created, ...p]);
        showToast("✅ Product added!");
      } else {
        const updated = await Api.put(`/products/${modal.id}`, payload);
        setProducts(p => p.map(x => x.id === modal.id ? { ...x, ...updated } : x));
        showToast("✅ Product updated!");
      }
      closeModal();
    } catch(e) {
      // optimistic fallback
      if (modal === "add") { setProducts(p => [{ ...payload, id: Date.now() }, ...p]); showToast("✅ Product added (demo)!"); closeModal(); }
      else { setProducts(p => p.map(x => x.id === modal.id ? { ...x, ...payload } : x)); showToast("✅ Updated (demo)!"); closeModal(); }
    }
    finally { setSaving(false); }
  };

  const deleteProduct = async (id) => {
    try { await Api.delete(`/products/${id}`); }
    catch {}
    setProducts(p => p.filter(x => x.id !== id));
    setDelId(null); showToast("🗑️ Product removed.");
  };

  const filtered = products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search.toLowerCase());
    const matchCat = filterCat === "All" || p.category === filterCat;
    return matchSearch && matchCat;
  });

  return (
    <SellerLayout active="Inventory">
      {toast && <div className="fixed bottom-6 right-6 z-50 bg-gray-900 text-white px-5 py-3 rounded-xl text-sm font-medium shadow-lg">{toast}</div>}

      {modal && (
        <Modal title={modal === "add" ? "Add New Product" : "Edit Product"} onClose={closeModal}>
          <ProductForm form={form} setForm={setForm} onSave={saveProduct} onCancel={closeModal} saving={saving} />
        </Modal>
      )}

      {delId && (
        <Modal title="Delete Product" onClose={() => setDelId(null)}>
          <p className="text-gray-600 mb-5">Are you sure you want to delete this product? This cannot be undone.</p>
          <div className="flex gap-3">
            <button onClick={() => setDelId(null)} className="flex-1 py-3 bg-stone-100 text-gray-700 font-semibold rounded-xl text-sm">Cancel</button>
            <button onClick={() => deleteProduct(delId)} className="flex-1 py-3 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700 transition-all text-sm">Delete</button>
          </div>
        </Modal>
      )}

      <div className="max-w-5xl">
        <div className="flex items-center justify-between mb-8">
          <div>
            <h1 className="font-display text-3xl font-bold text-gray-900">Inventory</h1>
            <p className="text-gray-400 mt-1">{products.length} products total</p>
          </div>
          <button onClick={openAdd} className="px-5 py-2.5 bg-gray-900 text-white text-sm font-semibold rounded-xl hover:bg-gray-700 transition-all flex items-center gap-2">
            ＋ Add Product
          </button>
        </div>

        {/* Filters */}
        <div className="flex flex-col md:flex-row gap-3 mb-6">
          <div className="relative flex-1">
            <svg className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search products…"
              className="w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-sage bg-white" />
          </div>
          <div className="flex gap-2 flex-wrap">
            {["All",...CATEGORIES].map(c=>(
              <button key={c} onClick={()=>setFilterCat(c)}
                className={`px-3 py-2 rounded-lg text-xs font-semibold transition-all ${filterCat===c?"bg-gray-900 text-white":"bg-white border border-stone-200 text-gray-500 hover:border-sage hover:text-sage"}`}>
                {c}
              </button>
            ))}
          </div>
        </div>

        {/* Summary cards */}
        <div className="grid grid-cols-3 gap-4 mb-6">
          <div className="bg-white rounded-xl border border-stone-200 p-4"><p className="text-2xl font-bold text-gray-900">{products.length}</p><p className="text-xs text-gray-400 mt-0.5">Total Products</p></div>
          <div className="bg-white rounded-xl border border-stone-200 p-4"><p className="text-2xl font-bold text-amber-600">{products.filter(p=>p.stock>0&&p.stock<=10).length}</p><p className="text-xs text-gray-400 mt-0.5">Low Stock (≤10)</p></div>
          <div className="bg-white rounded-xl border border-stone-200 p-4"><p className="text-2xl font-bold text-red-500">{products.filter(p=>p.stock===0).length}</p><p className="text-xs text-gray-400 mt-0.5">Out of Stock</p></div>
        </div>

        {/* Table */}
        {loading ? (
          <div className="space-y-3">{[1,2,3,4,5].map(i=><div key={i} className="h-14 rounded-xl bg-stone-100 animate-pulse"></div>)}</div>
        ) : (
          <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
            <table className="w-full text-sm">
              <thead className="bg-stone-50 border-b border-stone-200">
                <tr>{["Product","Category","Price","Stock","Status","Actions"].map(h=>(
                  <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">{h}</th>
                ))}</tr>
              </thead>
              <tbody className="divide-y divide-stone-100">
                {filtered.length === 0 ? (
                  <tr><td colSpan={6} className="text-center py-12 text-gray-400">No products found</td></tr>
                ) : filtered.map(p => (
                  <tr key={p.id} className="hover:bg-stone-50 transition-colors">
                    <td className="px-4 py-3 font-medium text-gray-900">{p.name}</td>
                    <td className="px-4 py-3 text-gray-500">{p.category}</td>
                    <td className="px-4 py-3 font-semibold text-gray-900">₱{Number(p.price).toLocaleString()}</td>
                    <td className="px-4 py-3 font-medium">{p.stock} {p.unit}</td>
                    <td className="px-4 py-3">
                      {p.stock === 0 ? <span className="px-2 py-1 bg-red-100 text-red-600 rounded-full text-xs font-semibold">Out of Stock</span>
                       : p.stock <= 10 ? <span className="px-2 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-semibold">Low Stock</span>
                       : <span className="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold">In Stock</span>}
                    </td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <button onClick={() => openEdit(p)} className="px-3 py-1.5 bg-stone-100 text-gray-600 text-xs font-semibold rounded-lg hover:bg-stone-200 transition-all">Edit</button>
                        <button onClick={() => setDelId(p.id)} className="px-3 py-1.5 bg-red-50 text-red-500 text-xs font-semibold rounded-lg hover:bg-red-100 transition-all">Delete</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </SellerLayout>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
